services:
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    hostname: kafka
    container_name: weather-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:29092 --list"]
      interval: 10s
      timeout: 10s
      retries: 12
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - weather-net

  kafka-init:
    image: confluentinc/cp-kafka:7.7.1
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - bash
      - -c
      - |
        kafka-topics --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic ${KAFKA_TOPIC:-weather.raw} \
          --partitions 3 \
          --replication-factor 1

        kafka-topics --bootstrap-server kafka:29092 \
          --describe \
          --topic ${KAFKA_TOPIC:-weather.raw}
    networks:
      - weather-net

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: weather-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: weather-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - weather-net

  weather-db:
    image: postgres:16-alpine
    container_name: weather-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${WEATHER_DB_NAME:-weather}
      POSTGRES_USER: ${WEATHER_DB_USER:-weather_user}
      POSTGRES_PASSWORD: ${WEATHER_DB_PASSWORD:-change_me_weather}
    ports:
      - "${WEATHER_DB_PORT:-5433}:5432"
    volumes:
      - weather-postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/001-weather.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${WEATHER_DB_USER:-weather_user} -d ${WEATHER_DB_NAME:-weather}",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - weather-net

  weather-producer:
    build:
      context: ./producer
    container_name: weather-producer
    restart: unless-stopped
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      CITY_NAME: ${CITY_NAME:-Paris}
      LATITUDE: ${LATITUDE:-48.8566}
      LONGITUDE: ${LONGITUDE:-2.3522}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-30}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-weather.raw}
    networks:
      - weather-net

  spark-streaming:
    build:
      context: ./spark
    container_name: weather-spark
    restart: unless-stopped
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      weather-db:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-weather.raw}
      BRONZE_PATH: /opt/pipeline/data/bronze
      SILVER_PATH: /opt/pipeline/data/silver
      CHECKPOINT_ROOT: /opt/pipeline/data/checkpoints
      POSTGRES_URL: jdbc:postgresql://weather-db:5432/${WEATHER_DB_NAME:-weather}
      POSTGRES_USER: ${WEATHER_DB_USER:-weather_user}
      POSTGRES_PASSWORD: ${WEATHER_DB_PASSWORD:-change_me_weather}
      POSTGRES_TABLE: weather_observations
    ports:
      - "4040:4040"
    volumes:
      - ./data:/opt/pipeline/data
    networks:
      - weather-net

  airflow-db:
    image: postgres:16-alpine
    container_name: weather-airflow-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AIRFLOW_DB_NAME:-airflow}
      POSTGRES_USER: ${AIRFLOW_DB_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD:-change_me_airflow_db}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${AIRFLOW_DB_USER:-airflow} -d ${AIRFLOW_DB_NAME:-airflow}",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data
    networks:
      - weather-net

  airflow-init:
    build:
      context: ./airflow
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      airflow-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      weather-db:
        condition: service_healthy
    environment: &airflow-common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:-change_me_airflow_db}@airflow-db/${AIRFLOW_DB_NAME:-airflow}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: local-development-only
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-weather.raw}
      OPEN_METEO_LATITUDE: ${LATITUDE:-48.8566}
      OPEN_METEO_LONGITUDE: ${LONGITUDE:-2.3522}
      SILVER_PATH: /opt/pipeline/data/silver
      WEATHER_DB_HOST: weather-db
      WEATHER_DB_PORT: "5432"
      WEATHER_DB_NAME: ${WEATHER_DB_NAME:-weather}
      WEATHER_DB_USER: ${WEATHER_DB_USER:-weather_user}
      WEATHER_DB_PASSWORD: ${WEATHER_DB_PASSWORD:-change_me_weather}
    volumes: &airflow-common-volumes
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./data:/opt/pipeline/data
    command:
      - bash
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username "${AIRFLOW_USER:-airflow}" \
          --password "${AIRFLOW_PASSWORD:-change_me_airflow_ui}" \
          --firstname Data \
          --lastname Engineer \
          --role Admin \
          --email airflow@example.com || true
    networks:
      - weather-net

  airflow-webserver:
    build:
      context: ./airflow
    user: "${AIRFLOW_UID:-50000}:0"
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-common-env
    volumes: *airflow-common-volumes
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 12
    networks:
      - weather-net

  airflow-scheduler:
    build:
      context: ./airflow
    user: "${AIRFLOW_UID:-50000}:0"
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-common-env
    volumes: *airflow-common-volumes
    command: scheduler
    networks:
      - weather-net

  grafana:
    image: grafana/grafana:11.6.16
    container_name: weather-grafana
    restart: unless-stopped
    depends_on:
      weather-db:
        condition: service_healthy
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change_me_grafana}
      GF_USERS_ALLOW_SIGN_UP: "false"
      WEATHER_DB_NAME: ${WEATHER_DB_NAME:-weather}
      WEATHER_DB_USER: ${WEATHER_DB_USER:-weather_user}
      WEATHER_DB_PASSWORD: ${WEATHER_DB_PASSWORD:-change_me_weather}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - weather-net

volumes:
  kafka-data:
  weather-postgres-data:
  airflow-postgres-data:
  grafana-data:

networks:
  weather-net:
    driver: bridge
